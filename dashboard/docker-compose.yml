# =============================================================================
# SMC Dashboard - Docker Compose
# =============================================================================
version: '3.8'

services:
  smc-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smc-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - smc-network

networks:
  smc-network:
    driver: bridge
